databases:
  - name: sisdoc-db
    databaseName: sisdoc
    user: sisdoc
    plan: free

services:
  # ── Backend Django ──
  - type: web
    name: sisdoc-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sisdoc-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "sisdoc-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://sisdoc-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend React/Vite ──
  - type: web
    name: sisdoc-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://sisdoc-backend.onrender.com/api/"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
